<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Generator API Frontend</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Portfolio Generator</h1>
      <p>Flask API is running on AWS-ready setup.</p>
      <ul>
        <li><code>GET /health</code></li>
        <li><code>GET /api/portfolios</code></li>
        <li><code>GET /api/portfolios/&lt;id&gt;</code></li>
        <li><code>POST /api/portfolios</code></li>
      </ul>
      <p>Try from terminal:</p>
      <pre>curl http://localhost:5000/health</pre>
    </main>
  </body>
</html>
